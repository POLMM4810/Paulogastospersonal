<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Paulo Personal">
<title>Paulo Personal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#070712;font-family:Georgia,serif;overflow-x:hidden;text-transform:uppercase;letter-spacing:.3px;}
:root{--gold:#C17D3C;--gold2:rgba(193,125,60,0.25);--blue:#7EC8E3;--red:#F0A0A0;--bg:#070712;--bg2:#0E0E22;--bg3:#16162A;--border:#1E1E38;--text:#E8E0D0;--muted:#888;}
input,select,button{font-family:Georgia,serif;text-transform:none;letter-spacing:normal;}
input::placeholder{color:#333;text-transform:uppercase;}
select option{background:#16162A;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#1E1E38;border-radius:3px;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ring{0%,100%{opacity:.1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* PIN */
#pin{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.ring{position:absolute;border-radius:50%;border:1px solid var(--gold);top:50%;left:50%;transform:translate(-50%,-50%);animation:ring 3s ease-in-out infinite;}
.pin-brand{animation:fadeUp .9s ease;text-align:center;position:relative;z-index:1;}
.pin-dots{display:flex;gap:18px;justify-content:center;margin-bottom:20px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:transparent;border:2px solid #2A2A40;transition:all .15s;}
.pin-dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px var(--gold2);}
.pin-dot.err{background:#B85450;border-color:#B85450;}
#pin-field:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold2);}
#pin-err{color:#B85450;font-size:12px;margin-top:12px;min-height:18px;letter-spacing:1px;}
/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
#app.on{display:flex;}
/* Header */
#hdr{background:#050510;border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;}
.hdr-logo{display:flex;align-items:center;gap:10px;}
.hdr-sub{color:var(--gold);font-size:8px;letter-spacing:4px;font-family:monospace;}
.hdr-total{color:var(--text);font-size:20px;font-weight:bold;line-height:1.1;}
.hdr-right{text-align:right;}
.hdr-persons{display:flex;gap:8px;justify-content:flex-end;font-size:11px;margin-bottom:3px;}
.hdr-bal{display:flex;align-items:center;gap:5px;justify-content:flex-end;font-size:11px;font-weight:bold;}
.sdot{width:7px;height:7px;border-radius:50%;background:#2A5A2A;animation:blink 3s infinite;flex-shrink:0;}
.sspin{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--gold);border-top-color:transparent;animation:spin .7s linear infinite;flex-shrink:0;}
#sync-txt{font-size:9px;color:#444;text-align:right;margin-top:2px;font-family:monospace;min-height:12px;}
/* Month bar */
#mbar{margin-top:8px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;color:var(--gold);letter-spacing:1px;}
#mdrop{display:none;margin-top:6px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);overflow:hidden;}
#mdrop.on{display:block;}
.mrow{padding:10px 14px;border-bottom:1px solid #141428;cursor:pointer;display:flex;justify-content:space-between;font-size:13px;color:#777;}
.mrow:active{background:var(--bg3);}
.mrow.cur{background:var(--bg3);color:var(--text);font-weight:bold;}
#nm-form{padding:10px 14px;border-top:1px solid #141428;display:none;gap:6px;flex-wrap:wrap;align-items:center;}
#nm-form.on{display:flex;}
/* Tabs */
#tabs{display:flex;overflow-x:auto;gap:5px;padding:10px 12px 2px;scrollbar-width:none;}
#tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:6px 11px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-family:Georgia,serif;background:#0E0E22;color:#666;transition:all .12s;}
.tab.on{color:#fff;font-weight:bold;}
.tab:active{opacity:.7;transform:scale(.95);}
/* Content */
#content{padding:10px 12px 60px;flex:1;}
/* Cards */
.card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.card-hdr{padding:12px 16px;border-bottom:1px solid #1A1A2E;display:flex;justify-content:space-between;align-items:center;}
.lbl{font-size:8px;letter-spacing:4px;font-family:monospace;text-transform:uppercase;}
/* Balance */
.bal-grid{display:flex;justify-content:space-between;align-items:flex-end;padding:16px;}
/* Cat summary */
.cat-row{background:var(--bg2);border-radius:12px;border:1px solid #141428;padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:background .12s;}
.cat-row:active{background:var(--bg3);}
/* Rows */
.xrow{border-bottom:1px solid #141428;transition:background .1s;}
.xrow:active{background:var(--bg3);}
.xin{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;}
.xleft{display:flex;align-items:center;gap:8px;flex:1;}
.xright{display:flex;align-items:center;gap:10px;}
.ibt{background:none;border:none;cursor:pointer;font-size:14px;opacity:.45;padding:0 2px;}
/* Edit */
.erow{display:flex;gap:5px;padding:8px 12px;flex-wrap:wrap;align-items:center;}
.ei{border:1px solid #2A2A40;border-radius:8px;padding:6px 10px;font-size:13px;background:var(--bg3);color:var(--text);outline:none;}
.ei.w{flex:2;min-width:90px;}
.ei.n{width:74px;}
/* Add */
.arow{display:flex;gap:5px;padding:10px 12px;background:#070718;flex-wrap:wrap;}
.ai{border:1px solid #2A2A40;border-radius:8px;padding:7px 10px;font-size:13px;background:var(--bg3);color:var(--text);outline:none;}
.ai.w{flex:2;min-width:90px;}
.ai.n{width:70px;}
/* Subtotals */
.subs{display:flex;justify-content:flex-end;gap:14px;padding:7px 16px;background:#070718;border-top:1px solid #141428;font-size:11px;}
.empty{padding:26px;text-align:center;color:#333;font-size:13px;}
/* Vac */
.vrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1A1A2E;}
.vresult{background:#070718;border-radius:10px;padding:12px 14px;margin-top:14px;}
.inline-in{border:1px solid #2A2A40;border-radius:8px;padding:5px 8px;font-size:13px;background:var(--bg3);color:var(--text);width:90px;text-align:right;outline:none;}

/* Bottom Nav */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#050510;border-top:1px solid #1A1A2E;display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;border:none;background:none;cursor:pointer;gap:3px;transition:all .15s;}
.bnav-btn:active{background:#1A1A2E;}
.bnav-icon{font-size:20px;line-height:1;}
.bnav-label{font-size:9px;color:#444;letter-spacing:1px;font-family:Georgia,serif;text-transform:uppercase;}
.bnav-btn.on .bnav-label{color:#C17D3C;}
.bnav-btn.on .bnav-icon{filter:drop-shadow(0 0 4px rgba(193,125,60,.6));}
#content{padding:10px 12px 80px;}

/* UPPERCASE everything except inputs */
body { text-transform: uppercase; }
input, select, textarea, input::placeholder {
  text-transform: none !important;
  color: #E8E0D0 !important;
  background: #16162A !important;
  border: 1px solid #2A2A40 !important;
  border-radius: 8px;
}
select option { background: #16162A !important; color: #E8E0D0 !important; }
</style>
</head>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
var PIN_CODE = "1111";
var FB = "https://casa-pm-default-rtdb.europe-west1.firebasedatabase.app/paulo_personal.json";
var LS = "ppz3";
var MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var CATS_BASE = [
  {id:"ocio",     label:"Ocio Personal",  emoji:"🍻", color:"#C17D3C"},
  {id:"coche",    label:"Coche",          emoji:"🚗", color:"#3A7CA5"},
  {id:"inversion",label:"Inversión",      emoji:"📈", color:"#27AE60"},
  {id:"regalos",  label:"Regalos",        emoji:"🎁", color:"#C4756A"},
  {id:"pelo",     label:"Peluquería",     emoji:"💇", color:"#7B68B5"},
  {id:"otros",    label:"Otros",          emoji:"🛠️", color:"#6B8E6B"}
];
var CAT_COLORS = ["#C17D3C","#3A7CA5","#27AE60","#8C3A8C","#C4756A","#7B68B5","#6B8E6B","#1A5A8A","#8A5A1A","#B85450"];
var CAT_EMOJIS = ["🍻","🚗","📈","🧧","🎁","💇","🛠️","🏋️","🐾","🏥","📚","🎓","💅","🎸","⚽","🍽️","💈","✈️","💼","🎯"];
var BANKINTER_BASE = [
  {id:"bk1", label:"Estudios Vera myinvestor", importe:100},
  {id:"bk2", label:"Préstamo myinvestor",       importe:70}
];
var SABADELL_BASE = [
  {id:"sb1", label:"Cocina Leroy Merlin",    importe:106.82},
  {id:"sb2", label:"Préstamo Hipoteca",       importe:247.65},
  {id:"sb3", label:"Segundo préstamo",        importe:238.60},
  {id:"sb4", label:"Comunidad vecinos",       importe:60.50},
  {id:"sb5", label:"Alquiler piso",           importe:280},
  {id:"sb6", label:"Cooperativa",             importe:50},
  {id:"sb7", label:"Estudios Vera",           importe:50},
  {id:"sb8", label:"Colegio",                 importe:43}
];

// ─── STATE ─────────────────────────────────────────────────────────────────
var S = {
  months: {},
  customCats: [],
  curKey: null,
  tab: "resumen",
  editId: null,
  editRow: {},
  editSec: null,
  newRow: {concepto:"",importe:""},
  syncing: false,
  pollTimer: null,
  lastWritten: null,
  lastTs: null
};

function nowKey(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function fmt(n){return Number(n||0).toFixed(2).replace(".",",")+"\u00a0\u20ac";}
function uid(){return Math.random().toString(36).slice(2,9);}
function cats(){return CATS_BASE.concat(S.customCats||[]);}

function seedMonth(){
  var g={};CATS_BASE.forEach(function(c){g[c.id]=[];});
  g.ocio=[
    {id:"o1",concepto:"Ifevi",importe:76},
    {id:"o2",concepto:"Taxis",importe:8}
  ];
  g.inversion=[
    {id:"i1",concepto:"BTC",importe:500,nota:"73.300$ aprox"},
    {id:"i2",concepto:"Orden BTC",importe:100},
    {id:"i3",concepto:"Créditos startup",importe:50}
  ];
  g.pelo=[{id:"p1",concepto:"Peluquería",importe:16}];
  g.otros=[
    {id:"t1",concepto:"Carcasa móvil",importe:6.20},
    {id:"t2",concepto:"Fisio",importe:45},
    {id:"t3",concepto:"Bici + estática",importe:593},
    {id:"t4",concepto:"Tablet Galaxy",importe:239},
    {id:"t5",concepto:"Soporte+funda silla",importe:39.80},
    {id:"t6",concepto:"Parking",importe:7.90}
  ];
  return {
    gastos:g,
    gasolina:[
      {id:"g1",fecha:"02/05/26",precio:1.44,euros:41,litros:37.14,kms:305,km_total:100481},
      {id:"g2",fecha:"14/05/26",precio:1.48,euros:70,litros:47.17,kms:691,km_total:101184},
      {id:"g3",fecha:"26/05/26",precio:1.51,euros:66.51,litros:44,kms:593,km_total:101766}
    ],
    apuestas:{balance_mes:-127,acum_anio:-1047,lineas:[]},
    bankinter:BANKINTER_BASE.map(function(b){return Object.assign({},b,{pagado:b.id==="bk1"});}),
    sabadell:SABADELL_BASE.map(function(b){return Object.assign({},b,{pagado:["sb1","sb2","sb3","sb4","sb5","sb6","sb7"].indexOf(b.id)>=0});}),
    notas:[
      {id:"n1",texto:"Apuestas 2026: balance mes -127€ | acumulado año -1.047€",tipo:"warning"},
      {id:"n2",texto:"Coche: aceite y bombillas al día (100.175 km)",tipo:"info"}
    ],
    meta:{presupuesto:1500,bote:0},
    alertas:{}
  };
}
function emptyMonth(){
  var g={};
  CATS_BASE.forEach(function(c){g[c.id]=[];});
  (S.customCats||[]).forEach(function(c){g[c.id]=[];});
  return {
    gastos:g, gasolina:[],
    apuestas:{balance_mes:0,acum_anio:0,lineas:[]},
    bankinter:BANKINTER_BASE.map(function(b){return Object.assign({},b,{pagado:false});}),
    sabadell:SABADELL_BASE.map(function(b){return Object.assign({},b,{pagado:false});}),
    notas:[],
    meta:{presupuesto:1500,bote:0},
    alertas:{}
  };
}

// ─── LOCAL STORAGE ─────────────────────────────────────────────────────────
function saveLocal(){
  try{localStorage.setItem(LS,JSON.stringify({months:S.months,customCats:S.customCats}));}catch(e){}
}
function loadLocal(){
  try{
    var r=localStorage.getItem(LS);
    if(r){var d=JSON.parse(r);S.months=d.months||{};S.customCats=d.customCats||[];}
  }catch(e){}
}

// ─── FIREBASE REST ─────────────────────────────────────────────────────────
function fbWrite(cb){
  var payload={months:S.months,customCats:S.customCats,ts:Date.now()};
  S.lastWritten=JSON.stringify(S.months);
  setSyncing(true);
  setTxt("guardando…");
  fetch(FB,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
    .then(function(r){
      if(!r.ok)throw new Error("HTTP "+r.status);
      S.lastTs=payload.ts;
      setTxt("✓ "+new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}));
      setSyncing(false);
      if(cb)cb();
    })
    .catch(function(e){
      setTxt("⚠️ "+e.message);
      setSyncing(false);
    });
}
function fbRead(){
  fetch(FB)
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(val){
      if(!val||!val.months)return;
      if(val.ts&&val.ts===S.lastTs)return;
      var inc=JSON.stringify(val.months);
      if(inc===S.lastWritten)return;
      if(inc===JSON.stringify(S.months))return;
      S.lastTs=val.ts||null;
      S.months=val.months;
      S.customCats=val.customCats||S.customCats;
      saveLocal();
      renderAll();
      setTxt("↓ "+new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}));
    })
    .catch(function(e){setTxt("⚠️ "+e.message);});
}

// ─── PIN ───────────────────────────────────────────────────────────────────
(function(){
  var field=document.getElementById("pin-field");
  setTimeout(function(){field.focus();},300);
  field.addEventListener("input",function(){
    var v=this.value.replace(/\D/g,"").slice(0,4);
    this.value=v;
    for(var i=0;i<4;i++){
      var d=document.getElementById("pd"+i);
      d.className="pin-dot"+(v.length>i?" on":"");
    }
    if(v.length===4){
      var self=this;
      setTimeout(function(){
        if(v===PIN_CODE){unlock();}
        else{
          for(var i=0;i<4;i++)document.getElementById("pd"+i).className="pin-dot err";
          document.getElementById("pin-err").textContent="PIN incorrecto";
          document.getElementById("pin-wrap").style.animation="shake .6s";
          setTimeout(function(){
            document.getElementById("pin-wrap").style.animation="";
            document.getElementById("pin-err").textContent="";
            self.value="";
            for(var i=0;i<4;i++)document.getElementById("pd"+i).className="pin-dot";
            self.focus();
          },700);
        }
      },150);
    }
  });
  document.getElementById("pin").addEventListener("click",function(e){
    if(e.target!==field)field.focus();
  });
})();

function unlock(){
  document.getElementById("pin").style.display="none";
  loadLocal();
  if(!Object.keys(S.months).length){
    var k=nowKey();
    S.months[k]=seedMonth();
    saveLocal();
  }
  launch();
}

function launch(){
  var k=nowKey();
  S.curKey=S.months[k]?k:Object.keys(S.months).sort().reverse()[0]||k;
  if(!S.months[S.curKey])S.months[S.curKey]=seedMonth();
  document.getElementById("app").className="on";
  renderAll();
  startPoll();
}

// ─── DATA ──────────────────────────────────────────────────────────────────
function cur(){return S.months[S.curKey]||emptyMonth();}
function saveData(d){S.months[S.curKey]=d;saveLocal();renderAll();fbWrite();}

function totals(){
  var t=0;
  var g=cur().gastos;
  Object.keys(g).forEach(function(k){g[k].forEach(function(x){t+=x.importe;});});
  var gas=cur().gasolina||[];gas.forEach(function(x){t+=x.euros||0;});
  return {total:t};
}
function catTot(id){
  var cat=(cur().gastos[id]||[]);
  var t=cat.reduce(function(s,x){return s+x.importe;},0);
  return {total:t};
}
function bankTot(which){
  var items=cur()[which]||[];
  var total=items.reduce(function(s,x){return s+x.importe;},0);
  var paid=items.filter(function(x){return x.pagado;}).reduce(function(s,x){return s+x.importe;},0);
  return {total:total,paid:paid,pending:total-paid};
}
function gasTot(){
  var gas=cur().gasolina||[];
  return gas.reduce(function(s,x){return s+(x.euros||0);},0);
}

// ─── CRUD básico (gastos por categoría) ──────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");}
function startEdit(id,sec,enc){
  S.editId=id;S.editSec=sec;
  try{S.editRow=JSON.parse(decodeURIComponent(enc));}catch(e){S.editRow={};}
  renderContent();
}
function cancelEdit(){S.editId=null;renderContent();}
function saveEdit(catId,id){
  var imp=parseFloat(String(S.editRow.importe).replace(",","."));
  if(isNaN(imp))return;
  var d=cur();
  d.gastos[catId]=d.gastos[catId].map(function(g){
    return g.id===id?Object.assign({},g,{concepto:S.editRow.concepto,importe:imp,nota:S.editRow.nota||""}):g;
  });
  S.editId=null;saveData(d);
}
function delGasto(catId,id){
  var d=cur();d.gastos[catId]=d.gastos[catId].filter(function(g){return g.id!==id;});saveData(d);
}
function addGasto(catId){
  var imp=parseFloat(String(S.newRow.importe).replace(",","."));
  if(!S.newRow.concepto||isNaN(imp)||imp<0)return;
  var d=cur();
  if(!d.gastos[catId])d.gastos[catId]=[];
  d.gastos[catId].push({id:uid(),concepto:S.newRow.concepto,importe:imp,nota:S.newRow.nota||""});
  S.newRow={concepto:"",importe:""};saveData(d);
}

// ─── GRÁFICAS (pure canvas, no dependencies) ─────────────────────────────────
var chartInstances={};
function destroyChart(id){} // no-op, canvas is replaced by innerHTML

function renderGraficas(){
  var keys=Object.keys(S.months).sort();
  if(keys.length===0) return '<div class="card"><div style="padding:30px;text-align:center;color:#444;font-size:13px;">SIN DATOS AÚN.<br><br>AÑADE GASTOS DE VARIOS MESES<br>PARA VER LA EVOLUCIÓN.</div></div>';

  var labels=keys.map(function(k){var p=k.split("-");return MESES[parseInt(p[1])-1].slice(0,3).toUpperCase()+" "+p[0].slice(2);});
  var allCats=cats();

  // ═══ CHART 1: Stacked bars evolution ═══
  var W=340,H=200,PL=48,PR=16,PT=16,PB=40;
  var CW=W-PL-PR, CH=H-PT-PB;
  var monthTotals=keys.map(function(k){
    return allCats.reduce(function(s,cat){return s+(S.months[k].gastos[cat.id]||[]).reduce(function(s2,x){return s2+x.importe;},0);},0);
  });
  var maxVal=Math.max.apply(null,monthTotals.concat([1]));
  var bw=keys.length>0?Math.min(40,CW/keys.length*0.6):20;
  var bSpace=keys.length>0?CW/keys.length:CW;

  // Grid lines
  var grid='';
  for(var gi=0;gi<=4;gi++){
    var gy=PT+gi*(CH/4);
    var gv=Math.round(maxVal*(1-gi/4));
    grid+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="#1C1C30" stroke-width="1"/>';
    grid+='<text x="'+(PL-6)+'" y="'+(gy+4)+'" text-anchor="end" font-size="9" fill="#555" font-family="monospace">'+gv+'</text>';
  }

  // Stacked bars
  var bars='';
  keys.forEach(function(k,i){
    var bx=PL+i*bSpace+(bSpace-bw)/2;
    var yOff=0;
    allCats.forEach(function(cat){
      var v=(S.months[k].gastos[cat.id]||[]).reduce(function(s,x){return s+x.importe;},0);
      if(v<=0)return;
      var bh=(v/maxVal)*CH;
      var by=PT+CH-yOff-bh;
      bars+='<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+cat.color+'" rx="1"/>';
      yOff+=bh;
    });
    // Total on top
    if(monthTotals[i]>0){
      var topY=PT+CH-(monthTotals[i]/maxVal)*CH-4;
      bars+='<text x="'+(bx+bw/2)+'" y="'+topY+'" text-anchor="middle" font-size="8" fill="#AAA" font-family="monospace">'+Math.round(monthTotals[i])+'</text>';
    }
    // X label
    bars+='<text x="'+(bx+bw/2)+'" y="'+(H-PB+14)+'" text-anchor="middle" font-size="9" fill="#666" font-family="monospace">'+labels[i]+'</text>';
  });

  // Legend - 2 per row
  var legItems=allCats.map(function(cat,i){
    var lx=PL+(i%3)*(CW/3), ly=H+8+Math.floor(i/3)*14;
    return '<rect x="'+lx+'" y="'+(ly)+'" width="8" height="8" fill="'+cat.color+'" rx="1"/>'
      +'<text x="'+(lx+10)+'" y="'+(ly+7)+'" font-size="8" fill="#888" font-family="monospace">'+cat.label.toUpperCase()+'</text>';
  }).join('');
  var legH=Math.ceil(allCats.length/3)*14+10;

  var svgEvol='<svg viewBox="0 0 '+W+' '+(H+legH)+'" style="width:100%;display:block;">'
    +'<rect width="'+W+'" height="'+(H+legH)+'" fill="#040410" rx="10"/>'
    +grid+bars+legItems+'</svg>';

  // ═══ CHART 2: Apuestas evolution (saldo mensual + acumulado) ═══
  var BW=340,BH=180,BPL=48,BPR=16,BPT=16,BPB=40;
  var BCW=BW-BPL-BPR, BCH=BH-BPT-BPB;
  var apData=keys.map(function(k){return (S.months[k].apuestas&&S.months[k].apuestas.balance_mes)||0;});
  var maxAbs=Math.max.apply(null,apData.map(Math.abs).concat([1]));
  var bw2=keys.length>0?Math.min(28,BCW/keys.length*0.5):20;
  var bsp2=keys.length>0?BCW/keys.length:BCW;
  var midY=BPT+BCH/2;
  var bscale=(BCH/2)/maxAbs;

  var bgrid='<line x1="'+BPL+'" y1="'+midY+'" x2="'+(BW-BPR)+'" y2="'+midY+'" stroke="#2A2A40" stroke-width="1"/>';
  bgrid+='<text x="'+(BPL-6)+'" y="'+(midY+3)+'" text-anchor="end" font-size="9" fill="#555" font-family="monospace">0</text>';

  var bbars='';
  keys.forEach(function(k,i){
    var cx=BPL+i*bsp2+bsp2/2;
    var v=apData[i];
    var bh=Math.abs(v)*bscale;
    var by=v>=0?midY-bh:midY;
    var color=v>=0?"#3A9A3A":"#B85450";
    bbars+='<rect x="'+(cx-bw2/2)+'" y="'+by+'" width="'+bw2+'" height="'+bh+'" fill="'+color+'" rx="2"/>';
    bbars+='<text x="'+cx+'" y="'+(BH-BPB+14)+'" text-anchor="middle" font-size="9" fill="#666" font-family="monospace">'+labels[i]+'</text>';
  });
  var svgPvM='<svg viewBox="0 0 '+BW+' '+(BH+20)+'" style="width:100%;display:block;">'
    +'<rect width="'+BW+'" height="'+(BH+20)+'" fill="#040410" rx="10"/>'
    +bgrid+bbars
    +'<rect x="'+BPL+'" y="'+(BH+6)+'" width="10" height="8" fill="#3A9A3A" rx="1"/>'
    +'<text x="'+(BPL+13)+'" y="'+(BH+14)+'" font-size="9" fill="#5AC45A" font-family="monospace">GANANCIA</text>'
    +'<rect x="'+(BPL+90)+'" y="'+(BH+6)+'" width="10" height="8" fill="#B85450" rx="1"/>'
    +'<text x="'+(BPL+103)+'" y="'+(BH+14)+'" font-size="9" fill="#F0A0A0" font-family="monospace">PERDIDA</text>'
    +'</svg>';


  // ═══ CHART 3: Donut this month ═══
  var d=cur(); var totalD=0;
  var slices=allCats.map(function(cat){
    var v=(d.gastos[cat.id]||[]).reduce(function(s,x){return s+x.importe;},0);
    totalD+=v; return{cat:cat,v:v};
  }).filter(function(s){return s.v>0;});

  var DW=340,DH=220,DR=78,CX=110,CY=110;
  var donutPaths='';
  if(totalD>0){
    var angle=-Math.PI/2;
    slices.forEach(function(s){
      var sweep=(s.v/totalD)*Math.PI*2;
      var ir=46;
      var x1=CX+DR*Math.cos(angle),   y1=CY+DR*Math.sin(angle);
      var x2=CX+DR*Math.cos(angle+sweep), y2=CY+DR*Math.sin(angle+sweep);
      var ix1=CX+ir*Math.cos(angle+sweep),iy1=CY+ir*Math.sin(angle+sweep);
      var ix2=CX+ir*Math.cos(angle),   iy2=CY+ir*Math.sin(angle);
      var large=sweep>Math.PI?1:0;
      donutPaths+='<path d="M'+x1.toFixed(1)+' '+y1.toFixed(1)
        +' A'+DR+' '+DR+' 0 '+large+' 1 '+x2.toFixed(1)+' '+y2.toFixed(1)
        +' L'+ix1.toFixed(1)+' '+iy1.toFixed(1)
        +' A'+ir+' '+ir+' 0 '+large+' 0 '+ix2.toFixed(1)+' '+iy2.toFixed(1)
        +' Z" fill="'+s.cat.color+'" stroke="#040410" stroke-width="2"/>';
      angle+=sweep;
    });
  }
  // Center
  donutPaths+='<text x="'+CX+'" y="'+(CY-8)+'" text-anchor="middle" font-size="9" fill="#555" font-family="monospace">TOTAL</text>';
  donutPaths+='<text x="'+CX+'" y="'+(CY+8)+'" text-anchor="middle" font-size="13" font-weight="bold" fill="#E8E0D0" font-family="Georgia,serif">'+fmt(totalD)+'</text>';

  // Right side legend with amounts
  var legR=slices.map(function(s,i){
    var ly=16+i*22;
    if(ly>DH-10)return '';
    var pct=Math.round(s.v/totalD*100);
    return '<rect x="225" y="'+ly+'" width="10" height="10" fill="'+s.cat.color+'" rx="1"/>'
      +'<text x="238" y="'+(ly+9)+'" font-size="9" fill="#888" font-family="monospace">'+s.cat.label.toUpperCase().slice(0,10)+'</text>'
      +'<text x="'+(DW-8)+'" y="'+(ly+9)+'" text-anchor="end" font-size="9" fill="'+s.cat.color+'" font-family="monospace">'+pct+'%</text>';
  }).join('');

  var svgDonut='<svg viewBox="0 0 '+DW+' '+DH+'" style="width:100%;display:block;">'
    +'<rect width="'+DW+'" height="'+DH+'" fill="#040410" rx="10"/>'
    +donutPaths+legR+'</svg>';

  return '<div class="card" style="margin-bottom:10px;"><div style="padding:14px 16px;">'
    +'<div class="lbl" style="color:#2A6AA0;margin-bottom:10px;">📈 EVOLUCIÓN MENSUAL · TOTAL POR MES</div>'
    +svgEvol+'</div></div>'
    +'<div class="card" style="margin-bottom:10px;"><div style="padding:14px 16px;">'
    +'<div class="lbl" style="color:#2A6AA0;margin-bottom:10px;">🧧 EVOLUCIÓN APUESTAS</div>'
    +svgPvM+'</div></div>'
    +'<div class="card"><div style="padding:14px 16px;">'
    +'<div class="lbl" style="color:#2A6AA0;margin-bottom:10px;">🥧 DISTRIBUCIÓN · '+MESES[parseInt(S.curKey.split("-")[1])-1].toUpperCase()+'</div>'
    +svgDonut+'</div></div>';
}

function renderAhorro(){
  var d=cur();
  var meta=d.meta||{presupuesto:2000,bote:0};
  var t=totals();
  var gastado=t.total;
  var ahorro=meta.presupuesto-gastado;
  var pct=meta.presupuesto>0?Math.min(100,(gastado/meta.presupuesto)*100):0;
  var barColor=pct>90?"#B85450":pct>70?"#E8C87A":"#5AC45A";
  var boteTotal=Object.keys(S.months).reduce(function(s,k){return s+((S.months[k].meta&&S.months[k].meta.bote)||0);},0);
  var alertas=d.alertas||{};

  // Build alerts HTML
  var alertHTML="";
  cats().forEach(function(cat){
    var lim=alertas[cat.id]||0;
    var gast=(d.gastos[cat.id]||[]).reduce(function(s,x){return s+x.importe;},0);
    if(lim>0&&gast>=lim*0.8){
      var over=gast>=lim;
      alertHTML+='<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:'+(over?"#1A0808":"#1A1800")+';border-radius:8px;margin-bottom:6px;">'
        +'<span>'+(over?"🔴":"🟡")+'</span>'
        +'<span style="font-size:12px;color:'+(over?"#F0A0A0":"#E8C87A")+';">'+cat.emoji+' '+cat.label+': '+fmt(gast)+' / '+fmt(lim)+(over?' ⚠️ SUPERADO':'  (80%+)')+'</span>'
        +'</div>';
    }
  });

  var p=S.curKey.split("-");
  return '<div class="card" style="margin-bottom:10px;"><div style="padding:16px;">'
    +'<div class="lbl" style="color:#27AE60;margin-bottom:14px;">🏆 META · '+MESES[parseInt(p[1])-1].toUpperCase()+' '+p[0]+'</div>'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:6px;">'
    +'<span style="font-size:11px;color:#666;">Gastado</span><span style="font-size:11px;color:#666;">Presupuesto</span></div>'
    +'<div style="background:#040410;border-radius:8px;height:14px;margin-bottom:8px;overflow:hidden;">'
    +'<div style="height:14px;border-radius:8px;background:'+barColor+';width:'+pct.toFixed(1)+'%;transition:width .5s;"></div></div>'
    +'<div style="display:flex;justify-content:space-between;margin-bottom:16px;">'
    +'<span style="font-size:18px;font-weight:bold;color:'+barColor+'">'+fmt(gastado)+'</span>'
    +'<span style="font-size:18px;font-weight:bold;color:#AAA">'+fmt(meta.presupuesto)+'</span></div>'
    +'<div style="background:#040410;border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;">'
    +(ahorro>=0
      ?'<div style="font-size:10px;color:#27AE60;letter-spacing:2px;margin-bottom:4px;">🎉 AHORRO ESTE MES</div>'
       +'<div style="font-size:32px;font-weight:bold;color:#5AC45A;">+'+fmt(ahorro)+'</div>'
       +'<div style="font-size:11px;color:#444;margin-top:4px;">¡Bien hecho! Añádelo al bote 👇</div>'
      :'<div style="font-size:10px;color:#B85450;letter-spacing:2px;margin-bottom:4px;">⚠️ PRESUPUESTO SUPERADO</div>'
       +'<div style="font-size:32px;font-weight:bold;color:#F0A0A0;">'+fmt(ahorro)+'</div>'
    )+'</div>'
    +'<div style="display:flex;gap:8px;align-items:center;margin-bottom:0;">'
    +'<span style="font-size:12px;color:#666;flex:1;">PRESUPUESTO DEL MES (€)</span>'
    +'<input class="iline" type="number" value="'+meta.presupuesto+'" onchange="updateMeta(\'presupuesto\',this.value)" style="width:100px;">'
    +'</div></div></div>'
    // Bote inversión
    +'<div class="card" style="margin-bottom:10px;"><div style="padding:16px;background:#0A180A;border-radius:14px;">'
    +'<div class="lbl" style="color:#27AE60;margin-bottom:10px;">💰 BOTE DE INVERSIÓN</div>'
    +'<div style="font-size:32px;font-weight:bold;color:#5AC45A;margin-bottom:12px;">'+fmt(boteTotal)+'</div>'
    +'<div style="display:flex;gap:8px;">'
    +(ahorro>0?'<button onclick="addBote('+ahorro.toFixed(2)+')" style="flex:1;background:#1A3A1A;color:#5AC45A;border:1px solid #2A5A2A;border-radius:8px;padding:9px;font-size:12px;cursor:pointer;font-family:Georgia,serif;">+ Añadir ahorro mes ('+fmt(ahorro)+')</button>':'')
    +'<button onclick="addBoteManual()" style="flex:1;background:#0A0A1A;color:#666;border:1px solid #1E1E38;border-radius:8px;padding:9px;font-size:12px;cursor:pointer;font-family:Georgia,serif;">+ Manual</button>'
    +'</div></div></div>'
    // Alertas activas
    +(alertHTML?'<div class="card" style="margin-bottom:10px;"><div style="padding:14px 16px;">'
      +'<div class="lbl" style="color:#E8C87A;margin-bottom:10px;">🔔 ALERTAS ACTIVAS</div>'
      +alertHTML+'</div></div>':"")
    // Límites
    +'<div class="card"><div style="padding:14px 16px;">'
    +'<div class="lbl" style="color:#555;margin-bottom:10px;">⚙️ LÍMITES POR CATEGORÍA</div>'
    +'<div style="font-size:11px;color:#333;margin-bottom:12px;">ALERTA AL 80% Y AL 100% DEL LÍMITE. PON 0 PARA DESACTIVAR.</div>'
    +cats().map(function(cat){
      var lim=alertas[cat.id]||0;
      var gast=(d.gastos[cat.id]||[]).reduce(function(s,x){return s+x.importe;},0);
      var pctC=lim>0?Math.min(100,(gast/lim)*100):0;
      var bc=pctC>=100?"#B85450":pctC>=80?"#E8C87A":"#2A5A2A";
      return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #0A0A1A;">'
        +'<span style="font-size:15px;">'+cat.emoji+'</span>'
        +'<span style="font-size:12px;color:#888;flex:1;">'+cat.label.toUpperCase()+'</span>'
        +(lim>0?'<div style="width:50px;background:#040410;border-radius:4px;height:4px;overflow:hidden;"><div style="height:4px;background:'+bc+';width:'+pctC.toFixed(0)+'%;"></div></div>':'')
        +'<input class="iline" type="number" placeholder="0" value="'+(lim||"")+'" onchange="updateAlerta(\''+cat.id+'\',this.value)" style="width:80px;text-align:right;">'
        +'</div>';
    }).join("")
    +'</div></div>';
}

function updateMeta(key,val){var d=cur();if(!d.meta)d.meta={presupuesto:2000,bote:0};d.meta[key]=parseFloat(val)||0;saveData(d);}
function addBote(amount){var d=cur();if(!d.meta)d.meta={presupuesto:2000,bote:0};d.meta.bote=(d.meta.bote||0)+amount;saveData(d);}
function addBoteManual(){var v=prompt("¿Cuánto añades al bote de inversión?");if(!v)return;addBote(parseFloat(v.replace(",","."))||0);}
function updateAlerta(catId,val){var d=cur();if(!d.alertas)d.alertas={};d.alertas[catId]=parseFloat(val)||0;saveData(d);}

      +'<span style="background:#070718;border-radius:6px;padding:3px 8px;font-size:10px;color:#888;">'+g.precio+'€/L</span>'
      +'<span style="background:#070718;border-radius:6px;padding:3px 8px;font-size:10px;color:#888;">'+g.litros+'L</span>'
      +'<span style="background:#070718;border-radius:6px;padding:3px 8px;font-size:10px;color:#888;">'+g.kms+' km</span>'
      +'<span style="background:#070718;border-radius:6px;padding:3px 8px;font-size:10px;color:#666;">'+g.km_total+' km total</span>'
      +'</div></div></div>';
  }).join("");
  return '<div class="card" style="margin-bottom:10px;"><div style="padding:14px 16px;">'
    +'<div class="lbl" style="color:#C17D3C;margin-bottom:12px;">⛽ RESUMEN GASOLINA</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;">'
    +'<div style="flex:1;min-width:70px;background:#070718;border-radius:10px;padding:10px;text-align:center;">'
    +'<div style="font-size:9px;color:#555;letter-spacing:1px;">TOTAL</div><div style="font-size:18px;font-weight:bold;color:var(--text);">'+fmt(totalE)+'</div></div>'
    +'<div style="flex:1;min-width:70px;background:#070718;border-radius:10px;padding:10px;text-align:center;">'
    +'<div style="font-size:9px;color:#555;letter-spacing:1px;">LITROS</div><div style="font-size:18px;font-weight:bold;color:var(--text);">'+totalL.toFixed(1)+'L</div></div>'
    +'<div style="flex:1;min-width:70px;background:#070718;border-radius:10px;padding:10px;text-align:center;">'
    +'<div style="font-size:9px;color:#555;letter-spacing:1px;">KMS</div><div style="font-size:18px;font-weight:bold;color:var(--text);">'+totalKms+'</div></div>'
    +'<div style="flex:1;min-width:70px;background:#070718;border-radius:10px;padding:10px;text-align:center;">'
    +'<div style="font-size:9px;color:#555;letter-spacing:1px;">€/L MEDIO</div><div style="font-size:18px;font-weight:bold;color:var(--text);">'+avgPrice.toFixed(2)+'</div></div>'
    +'</div>'
    +(lastKm?'<div style="font-size:11px;color:#444;margin-top:10px;text-align:right;">Último km: <span style="color:#666;">'+lastKm.toLocaleString()+'</span></div>':"")
    +'</div></div>'
    +'<div class="card">'
    +'<div class="card-hdr"><div class="lbl" style="color:#C17D3C;">REPOSTAJES</div></div>'
    +(gas.length===0?'<div class="empty">Sin repostajes aún</div>':"")
    +rh
    +'<div class="arow" style="flex-direction:column;gap:8px;">'
    +'<div style="font-size:10px;color:#555;letter-spacing:2px;font-family:monospace;">AÑADIR REPOSTAJE</div>'
    +'<div style="display:flex;gap:5px;flex-wrap:wrap;">'
    +'<input id="ng-fecha" class="ai" style="width:90px;" placeholder="Fecha">'
    +'<input id="ng-precio" class="ai n" placeholder="€/L">'
    +'<input id="ng-euros" class="ai n" placeholder="€">'
    +'<input id="ng-litros" class="ai n" placeholder="Litros">'
    +'<input id="ng-kms" class="ai n" placeholder="Km viaje">'
    +'<input id="ng-kmtotal" class="ai n" placeholder="Km total">'
    +'<button style="background:#C17D3C;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:18px;font-weight:bold;" onclick="addGas()">+</button>'
    +'</div></div></div>';
}
function saveGasEdit(id){
  var d=cur();
  d.gasolina=d.gasolina.map(function(g){
    if(g.id!==id)return g;
    return {id:g.id,fecha:S.editRow.fecha||g.fecha,precio:parseFloat(S.editRow.precio)||g.precio,
      euros:parseFloat(S.editRow.euros)||g.euros,litros:parseFloat(S.editRow.litros)||g.litros,
      kms:parseFloat(S.editRow.kms)||g.kms,km_total:parseFloat(S.editRow.km_total)||g.km_total};
  });
  S.editId=null;saveData(d);
}
function delGas(id){var d=cur();d.gasolina=d.gasolina.filter(function(g){return g.id!==id;});saveData(d);}
function addGas(){
  var fecha=document.getElementById("ng-fecha").value;
  var euros=parseFloat(document.getElementById("ng-euros").value);
  if(!fecha||isNaN(euros))return;
  var d=cur();if(!d.gasolina)d.gasolina=[];
  d.gasolina.push({id:uid(),fecha:fecha,
    precio:parseFloat(document.getElementById("ng-precio").value)||0,euros:euros,
    litros:parseFloat(document.getElementById("ng-litros").value)||0,
    kms:parseFloat(document.getElementById("ng-kms").value)||0,
    km_total:parseFloat(document.getElementById("ng-kmtotal").value)||0});
  saveData(d);
}

// ─── APUESTAS ──────────────────────────────────────────────────────────────
function renderApuestas(){
  var ap=cur().apuestas||{balance_mes:0,acum_anio:0,lineas:[]};
  var bColor=ap.balance_mes>=0?"#5AC45A":"#F0A0A0";
  var aColor=ap.acum_anio>=0?"#5AC45A":"#F0A0A0";
  var rh=(ap.lineas||[]).map(function(l){
    if(S.editId===l.id){
      return '<div class="xrow"><div class="erow">'
        +'<input class="ei w" value="'+esc(l.desc)+'" oninput="S.editRow.desc=this.value">'
        +'<input class="ei n" placeholder="€ resultado" value="'+l.resultado+'" oninput="S.editRow.resultado=this.value">'
        +'<button class="ei" style="background:#27ae60;color:#fff;border:none;cursor:pointer;" onclick="saveBetEdit(\''+l.id+'\')">✓</button>'
        +'<button class="ei" style="background:#333;color:#888;border:none;cursor:pointer;" onclick="cancelEdit()">✕</button>'
        +'</div></div>';
    }
    var rc=l.resultado>=0?"#5AC45A":"#F0A0A0";
    return '<div class="xrow"><div class="xin">'
      +'<div class="xleft"><span style="font-size:13px;color:#C0B8A8;">'+esc(l.desc)+'</span></div>'
      +'<div class="xright"><span style="font-size:14px;font-weight:bold;color:'+rc+'">'+(l.resultado>=0?"+":"")+fmt(l.resultado)+'</span>'
      +'<button class="ibt" onclick="startEdit(\''+l.id+'\',\'bet\',\''+encodeURIComponent(JSON.stringify(l))+'\')">✏️</button>'
      +'<button class="ibt" onclick="delBet(\''+l.id+'\')">🗑️</button>'
      +'</div></div></div>';
  }).join("");
  return '<div class="card" style="margin-bottom:10px;"><div style="padding:16px;">'
    +'<div class="lbl" style="color:#8C3A8C;margin-bottom:12px;">🧧 APUESTAS Y QUINIELA</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-end;">'
    +'<div><div style="font-size:11px;color:#555;margin-bottom:4px;">Balance este mes</div>'
    +'<div style="font-size:32px;font-weight:bold;color:'+bColor+';">'+(ap.balance_mes>=0?"+":"")+fmt(ap.balance_mes)+'</div></div>'
    +'<div style="text-align:right;"><div style="font-size:11px;color:#555;margin-bottom:4px;">Acumulado año</div>'
    +'<div style="font-size:24px;font-weight:bold;color:'+aColor+';">'+(ap.acum_anio>=0?"+":"")+fmt(ap.acum_anio)+'</div></div></div>'
    +'<div style="display:flex;gap:10px;margin-top:14px;">'
    +'<div style="flex:1;"><div style="font-size:10px;color:#555;margin-bottom:4px;">Balance mes</div>'
    +'<input class="iline" type="number" style="width:100%;" value="'+ap.balance_mes+'" onchange="updateApBalance(\'mes\',this.value)"></div>'
    +'<div style="flex:1;"><div style="font-size:10px;color:#555;margin-bottom:4px;">Acumulado año</div>'
    +'<input class="iline" type="number" style="width:100%;" value="'+ap.acum_anio+'" onchange="updateApBalance(\'anio\',this.value)"></div>'
    +'</div></div></div>'
    +'<div class="card">'
    +'<div class="card-hdr"><div class="lbl" style="color:#8C3A8C;">REGISTRO APUESTAS</div></div>'
    +((ap.lineas||[]).length===0?'<div class="empty">Sin registros aún</div>':"")
    +rh
    +'<div class="arow">'
    +'<input id="nb-desc" class="ai w" placeholder="Descripción">'
    +'<input id="nb-res" class="ai n" placeholder="€ resultado">'
    +'<button style="background:#8C3A8C;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:18px;font-weight:bold;" onclick="addBet()">+</button>'
    +'</div></div>';
}
function saveBetEdit(id){
  var res=parseFloat(String(S.editRow.resultado).replace(",","."));if(isNaN(res))return;
  var d=cur();d.apuestas.lineas=d.apuestas.lineas.map(function(l){return l.id===id?Object.assign({},l,{desc:S.editRow.desc,resultado:res}):l;});
  S.editId=null;saveData(d);
}
function delBet(id){var d=cur();d.apuestas.lineas=d.apuestas.lineas.filter(function(l){return l.id!==id;});saveData(d);}
function addBet(){
  var desc=document.getElementById("nb-desc").value;
  var res=parseFloat(String(document.getElementById("nb-res").value).replace(",","."));
  if(!desc||isNaN(res))return;
  var d=cur();if(!d.apuestas.lineas)d.apuestas.lineas=[];
  d.apuestas.lineas.push({id:uid(),desc:desc,resultado:res});
  saveData(d);
}
function updateApBalance(which,val){
  var d=cur();var v=parseFloat(val)||0;
  if(which==="mes")d.apuestas.balance_mes=v;else d.apuestas.acum_anio=v;
  saveData(d);
}

// ─── BANCOS ────────────────────────────────────────────────────────────────
function renderBancos(){
  var bk=cur().bankinter||[];var sb=cur().sabadell||[];
  function bankSection(title,color,items,which){
    var tot=items.reduce(function(s,x){return s+x.importe;},0);
    var paid=items.filter(function(x){return x.pagado;}).reduce(function(s,x){return s+x.importe;},0);
    var rows=items.map(function(item){
      return '<div class="chk-row" onclick="toggleChk(\''+which+'\',\''+item.id+'\')" style="display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid #141428;cursor:pointer;">'
        +'<div style="display:flex;align-items:center;gap:10px;">'
        +'<div style="width:22px;height:22px;border-radius:6px;border:2px solid #2A2A40;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;'+(item.pagado?"background:#1A3A1A;border-color:#3A6A3A;":"")+'">'+(item.pagado?"✓":"")+'</div>'
        +'<span style="font-size:13px;color:'+(item.pagado?"#555":"#C0B8A8")+';'+(item.pagado?"text-decoration:line-through;":"")+'">'+esc(item.label)+'</span>'
        +'</div>'
        +'<span style="font-size:13px;font-weight:bold;color:'+(item.pagado?"#555":color)+'">'+fmt(item.importe)+'</span>'
        +'</div>';
    }).join("");
    var pct=tot>0?Math.round((paid/tot)*100):0;
    return '<div class="card" style="margin-bottom:10px;">'
      +'<div class="card-hdr" style="background:'+color+'18;">'
      +'<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:18px;">🏦</span>'
      +'<span style="font-size:14px;font-weight:bold;color:var(--text);">'+title+'</span></div>'
      +'<div style="text-align:right;">'
      +'<div style="font-size:13px;font-weight:bold;color:'+color+'">'+fmt(paid)+' / '+fmt(tot)+'</div>'
      +'<div style="font-size:10px;color:#444;">'+pct+'% cobrado</div>'
      +'</div></div>'
      +'<div style="height:3px;background:#070718;"><div style="height:3px;background:'+color+';width:'+pct+'%;transition:width .3s;"></div></div>'
      +rows
      +'<div style="padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #141428;">'
      +'<span style="font-size:12px;color:#555;">Pendiente</span>'
      +'<span style="font-size:14px;font-weight:bold;color:'+(paid<tot?"#F0A0A0":"#5AC45A")+'">'+fmt(tot-paid)+'</span>'
      +'</div></div>';
  }
  return bankSection("Bankinter","#1A7ABF",bk,"bankinter")
       + bankSection("Sabadell","#E8505B",sb,"sabadell");
}
function toggleChk(which,id){
  var d=cur();
  d[which]=d[which].map(function(x){return x.id===id?Object.assign({},x,{pagado:!x.pagado}):x;});
  saveData(d);
}

// ─── NOTAS ─────────────────────────────────────────────────────────────────
function renderNotasP(){
  var recs=cur().notas||[];
  var rh=recs.map(function(r){
    if(S.editId===r.id){
      return '<div class="xrow"><div class="erow">'
        +'<input class="ei w" value="'+esc(r.texto)+'" oninput="S.editRow.texto=this.value">'
        +'<select class="ei" onchange="S.editRow.tipo=this.value"><option value="info"'+(r.tipo==="info"?" selected":"")+'>ℹ️ Info</option><option value="warning"'+(r.tipo==="warning"?" selected":"")+'>⚠️ Alerta</option></select>'
        +'<button class="ei" style="background:#27ae60;color:#fff;border:none;cursor:pointer;" onclick="saveNotaP(\''+r.id+'\')">✓</button>'
        +'<button class="ei" style="background:#333;color:#888;border:none;cursor:pointer;" onclick="cancelEdit()">✕</button>'
        +'</div></div>';
    }
    return '<div class="xrow"><div class="xin" style="align-items:flex-start;padding:12px 14px;">'
      +'<div style="flex:1;">'
      +(r.tipo==="warning"?'<span style="font-size:10px;color:#E8C87A;letter-spacing:1px;font-family:monospace;">⚠️ RECORDATORIO</span>':'<span style="font-size:10px;color:#4A8CBF;letter-spacing:1px;font-family:monospace;">ℹ️ NOTA</span>')
      +'<div style="font-size:13px;color:#C0B8A8;margin-top:4px;line-height:1.5;">'+esc(r.texto)+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:4px;margin-left:10px;">'
      +'<button class="ibt" onclick="startEdit(\''+r.id+'\',\'nota\',\''+encodeURIComponent(JSON.stringify(r))+'\')">✏️</button>'
      +'<button class="ibt" onclick="delNotaP(\''+r.id+'\')">🗑️</button>'
      +'</div></div></div>';
  }).join("");
  return '<div class="card">'
    +'<div class="card-hdr"><div class="lbl" style="color:#8A5A1A;">📌 RECORDATORIOS Y NOTAS</div></div>'
    +(recs.length===0?'<div class="empty">Sin notas aún</div>':"")
    +rh
    +'<div class="arow">'
    +'<input id="nn-texto" class="ai w" placeholder="Texto de la nota">'
    +'<select id="nn-tipo" class="ai"><option value="info">ℹ️ Info</option><option value="warning">⚠️ Alerta</option></select>'
    +'<button style="background:#8A5A1A;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:18px;font-weight:bold;" onclick="addNotaP()">+</button>'
    +'</div></div>';
}
function saveNotaP(id){
  var d=cur();d.notas=d.notas.map(function(r){return r.id===id?Object.assign({},r,{texto:S.editRow.texto,tipo:S.editRow.tipo||r.tipo}):r;});
  S.editId=null;saveData(d);
}
function delNotaP(id){var d=cur();d.notas=d.notas.filter(function(r){return r.id!==id;});saveData(d);}
function addNotaP(){
  var texto=document.getElementById("nn-texto").value;
  if(!texto)return;
  var d=cur();if(!d.notas)d.notas=[];
  d.notas.push({id:uid(),texto:texto,tipo:document.getElementById("nn-tipo").value||"info"});
  saveData(d);
}
