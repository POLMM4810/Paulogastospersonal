<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Paulo Personal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#060610;font-family:Georgia,serif;overflow-x:hidden;}
:root{--gold:#C17D3C;--gold2:rgba(193,125,60,.25);--blue:#7EC8E3;--green:#5AC45A;--red:#F0A0A0;--bg:#060610;--bg2:#0C0C1E;--bg3:#14142A;--border:#1E1E3A;--text:#E8E0D0;--muted:#666;}
input,select,button{font-family:Georgia,serif;}
input::placeholder{color:#333;}
select option{background:#14142A;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#1E1E3A;border-radius:3px;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes ring{0%,100%{opacity:.08}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* PIN */
#pin{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.ring{position:absolute;border-radius:50%;border:1px solid #4A6FA5;top:50%;left:50%;transform:translate(-50%,-50%);animation:ring 3s ease-in-out infinite;}
#pin-field{width:180px;text-align:center;font-size:32px;letter-spacing:16px;background:var(--bg2);color:#4A8CBF;border:1.5px solid #1E2E48;border-radius:14px;padding:14px 20px;-webkit-text-security:disc;caret-color:#4A8CBF;transition:border-color .2s;outline:none;}
#pin-field:focus{border-color:#4A8CBF;box-shadow:0 0 0 3px rgba(74,140,191,.2);}
.pin-dot{width:14px;height:14px;border-radius:50%;background:transparent;border:2px solid #1E2E48;transition:all .15s;}
.pin-dot.on{background:#4A8CBF;border-color:#4A8CBF;box-shadow:0 0 8px rgba(74,140,191,.4);}
.pin-dot.err{background:#B85450;border-color:#B85450;}
/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
#app.on{display:flex;}
/* Header */
#hdr{background:#040410;border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;}
.hdr-sub{color:#4A8CBF;font-size:8px;letter-spacing:4px;font-family:monospace;}
.hdr-total{color:var(--text);font-size:20px;font-weight:bold;line-height:1.1;}
.sdot{width:7px;height:7px;border-radius:50%;background:#2A5A2A;animation:blink 3s infinite;flex-shrink:0;}
.sspin{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--gold);border-top-color:transparent;animation:spin .7s linear infinite;flex-shrink:0;}
#sync-txt{font-size:9px;color:#333;text-align:right;margin-top:2px;font-family:monospace;min-height:12px;}
#mbar{margin-top:8px;display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;color:#4A8CBF;letter-spacing:1px;}
#mdrop{display:none;margin-top:6px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);overflow:hidden;}
#mdrop.on{display:block;}
.mrow{padding:10px 14px;border-bottom:1px solid #0E0E1E;cursor:pointer;display:flex;justify-content:space-between;font-size:13px;color:#666;}
.mrow:active{background:var(--bg3);}
.mrow.cur{background:var(--bg3);color:var(--text);font-weight:bold;}
#nm-form{padding:10px 14px;border-top:1px solid #0E0E1E;display:none;gap:6px;flex-wrap:wrap;align-items:center;}
#nm-form.on{display:flex;}
/* Tabs */
#tabs{display:flex;overflow-x:auto;gap:5px;padding:10px 12px 2px;scrollbar-width:none;}
#tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:6px 11px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-family:Georgia,serif;background:#0C0C1E;color:#555;transition:all .12s;}
.tab.on{color:#fff;font-weight:bold;}
.tab:active{opacity:.7;transform:scale(.95);}
#content{padding:10px 12px 60px;flex:1;}
/* Cards */
.card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.card-hdr{padding:12px 16px;border-bottom:1px solid #121228;display:flex;justify-content:space-between;align-items:center;}
.lbl{font-size:8px;letter-spacing:4px;font-family:monospace;}
/* Rows */
.xrow{border-bottom:1px solid #0E0E1E;transition:background .1s;}
.xrow:active{background:var(--bg3);}
.xin{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;}
.xleft{display:flex;align-items:center;gap:8px;flex:1;}
.xright{display:flex;align-items:center;gap:8px;}
.ibt{background:none;border:none;cursor:pointer;font-size:13px;opacity:.4;padding:0 2px;}
/* Edit/Add */
.erow{display:flex;gap:5px;padding:8px 12px;flex-wrap:wrap;align-items:center;}
.ei{border:1px solid #1E1E3A;border-radius:8px;padding:6px 10px;font-size:13px;background:var(--bg3);color:var(--text);outline:none;}
.ei.w{flex:2;min-width:90px;}
.ei.n{width:74px;}
.arow{display:flex;gap:5px;padding:10px 12px;background:#040410;flex-wrap:wrap;}
.ai{border:1px solid #1E1E3A;border-radius:8px;padding:7px 10px;font-size:13px;background:var(--bg3);color:var(--text);outline:none;}
.ai.w{flex:2;min-width:90px;}
.ai.n{width:70px;}
.subs{display:flex;justify-content:flex-end;gap:14px;padding:7px 16px;background:#040410;border-top:1px solid #0E0E1E;font-size:11px;}
.empty{padding:24px;text-align:center;color:#333;font-size:13px;}
/* Checklist */
.chk-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid #0E0E1E;cursor:pointer;}
.chk-row:active{background:var(--bg3);}
.chk-left{display:flex;align-items:center;gap:10px;}
.chk-box{width:22px;height:22px;border-radius:6px;border:2px solid #1E1E3A;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s;}
.chk-box.done{background:#1A3A1A;border-color:#3A6A3A;}
.chk-label{font-size:13px;color:#C0B8A8;}
.chk-label.done{color:#444;text-decoration:line-through;}
.chk-amt{font-size:13px;font-weight:bold;}
/* Apuestas */
.bal-big{font-size:32px;font-weight:bold;margin:8px 0;}
.bet-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #0E0E1E;}
/* Gasolina */
.gas-card{background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:8px;}
.gas-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.gas-stat{background:#040410;border-radius:8px;padding:6px 10px;font-size:11px;color:#888;flex:1;min-width:60px;text-align:center;}
.gas-stat span{display:block;color:var(--text);font-size:13px;font-weight:bold;margin-top:2px;}
/* Inline input */
.iline{border:1px solid #1E1E3A;border-radius:8px;padding:5px 8px;font-size:13px;background:var(--bg3);color:var(--text);outline:none;}
/* Summary grid */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #0E0E1E;}
.sum-cat{display:flex;align-items:center;gap:8px;font-size:13px;color:#C8C0B0;}
.sum-amt{font-size:14px;font-weight:bold;}
/* Badge */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:bold;}
/* Note */
.note-box{background:#040410;border-radius:10px;padding:12px 14px;margin:10px 16px 14px;font-size:12px;color:#666;line-height:1.7;}
</style>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
</head>
<body>

<!-- APP -->
<div id="app">

<script>
var PIN_CODE = "1111";
var FB = "https://casa-pm-default-rtdb.europe-west1.firebasedatabase.app/paulo_personal.json";
var LS = "pp_v1";
var MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

var CATS = [
  {id:"ocio",     label:"Ocio Personal",  emoji:"🍻", color:"#C17D3C"},
  {id:"coche",    label:"Coche",          emoji:"🚗", color:"#3A7CA5"},
  {id:"inversion",label:"Inversión",      emoji:"📈", color:"#27AE60"},

  {id:"regalos",  label:"Regalos",        emoji:"🎁", color:"#C4756A"},
  {id:"pelo",     label:"Peluquería",     emoji:"💇", color:"#7B68B5"},
  {id:"otros",    label:"Otros",          emoji:"🛠️",  color:"#6B8E6B"}
];

  {id:"bk1", label:"Estudios Vera myinvestor", importe:100},
  {id:"bk2", label:"Préstamo myinvestor",       importe:70}
];

  {id:"sb4", label:"Comunidad vecinos",       importe:60.50},
  {id:"sb5", label:"Alquiler piso",           importe:280},
  {id:"sb6", label:"Cooperativa",             importe:50},
  {id:"sb7", label:"Estudios Vera",           importe:50},
  {id:"sb8", label:"Colegio",                 importe:43}
];

var S = {
  months:{}, curKey:null, tab:"resumen",
  editId:null, editRow:{}, editSec:null,
  newRow:{concepto:"",importe:"",persona:"paulo"},
  syncing:false, pollTimer:null, lastWritten:null, lastTs:null,
  newGas:{fecha:"",precio:"",euros:"",litros:"",kms:"",km_total:""},
  newBet:{desc:"",resultado:""}
};

function nowKey(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function fmt(n){return Number(n||0).toFixed(2).replace(".",",")+"\u00a0\u20ac";}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");}

function seedMonth(){
  var g={};CATS.forEach(function(c){g[c.id]=[];});
  // Seed with May 2026 data
  g.ocio=[

    {id:uid(),concepto:"Ocio varios",importe:313.37,nota:"17+13.5+10+8+5.32+14+9+18.6+11+13.4+16+7+10+10.75+39.15+51+6.5+8.5+14.6+9.5+3.2+10.7+5.9+9.2+27+7.65+20+9+19+3"}

  g.coche=[

function emptyMonth(){

// ─── LOCAL/FIREBASE ─────────────────────────────────────────────────────────
function saveLocal(){try{localStorage.setItem(LS,JSON.stringify(S.months));}catch(e){}}
function loadLocal(){try{var r=localStorage.getItem(LS);if(r){S.months=JSON.parse(r);return true;}}catch(e){}return false;}

function fbWrite(){
  S.lastWritten=JSON.stringify(S.months);
  setSyncing(true);setTxt("guardando…");
  fetch(FB,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({months:S.months,ts:Date.now()})})
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);S.lastTs=Date.now();setTxt("✓ "+hhmm());setSyncing(false);})
    .catch(function(e){setTxt("⚠️ "+e.message);setSyncing(false);});
}
function fbRead(){
  fetch(FB).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(val){
      if(!val||!val.months)return;
      if(val.ts&&val.ts===S.lastTs)return;
      var inc=JSON.stringify(val.months);
      if(inc===S.lastWritten||inc===JSON.stringify(S.months))return;
      S.lastTs=val.ts||null;S.months=val.months;saveLocal();renderAll();setTxt("↓ "+hhmm());
    }).catch(function(e){setTxt("⚠️ "+e.message);});
}
function startPoll(){fbRead();if(S.pollTimer)clearInterval(S.pollTimer);S.pollTimer=setInterval(fbRead,7000);}

function hhmm(){return new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});}

// ─── PIN ────────────────────────────────────────────────────────────────────
(function(){
  var f=document.getElementById("pin-field");
  setTimeout(function(){f.focus();},300);
  f.addEventListener("input",function(){
    var v=this.value.replace(/\D/g,"").slice(0,4);this.value=v;
    for(var i=0;i<4;i++){document.getElementById("pd"+i).className="pin-dot"+(v.length>i?" on":"");}
    if(v.length===4){
      var self=this;
      setTimeout(function(){
        if(v===PIN_CODE){unlock();}
        else{
          for(var i=0;i<4;i++)document.getElementById("pd"+i).className="pin-dot err";
          document.getElementById("pin-err").textContent="PIN incorrecto";
          document.getElementById("pin-wrap").style.animation="shake .6s";
          setTimeout(function(){document.getElementById("pin-wrap").style.animation="";document.getElementById("pin-err").textContent="";self.value="";for(var i=0;i<4;i++)document.getElementById("pd"+i).className="pin-dot";self.focus();},700);
        }
      },150);
    }
  });
  document.getElementById("pin").addEventListener("click",function(e){if(e.target!==f)f.focus();});
})();

function unlock(){
  document.getElementById("pin").style.display="none";
  if(!loadLocal()||!Object.keys(S.months).length){
    var k=nowKey();S.months={};S.months[k]=seedMonth();saveLocal();
  }
  launch();
}
function launch(){
  var k=nowKey();
  S.curKey=S.months[k]?k:Object.keys(S.months).sort().reverse()[0]||k;
  if(!S.months[S.curKey])S.months[S.curKey]=seedMonth();
  document.getElementById("app").className="on";
  renderAll();startPoll();
}

// ─── DATA ────────────────────────────────────────────────────────────────────
function cur(){return S.months[S.curKey]||emptyMonth();}
function saveData(d){S.months[S.curKey]=d;saveLocal();renderAll();fbWrite();}

function totalMes(){
  var g=cur().gastos;var t=0;
  Object.keys(g).forEach(function(k){g[k].forEach(function(x){t+=x.importe;});});
  var gas=cur().gasolina||[];gas.forEach(function(x){t+=x.euros||0;});
  return t;
}
function catTot(id){
  var cat=(cur().gastos[id]||[]);
  return cat.reduce(function(s,x){return s+x.importe;},0);
}
function bankTot(which){
  var items=cur()[which]||[];
  var total=items.reduce(function(s,x){return s+x.importe;},0);
  var paid=items.filter(function(x){return x.pagado;}).reduce(function(s,x){return s+x.importe;},0);
  return {total:total,paid:paid,pending:total-paid};
}

    var rc=l.resultado>=0?"#5AC45A":"#F0A0A0";
    return '<div class="xrow"><div class="xin">'
      +'<div class="xleft"><span style="font-size:13px;color:#C0B8A8;">'+esc(l.desc)+'</span></div>'
      +'<div class="xright"><span style="font-size:14px;font-weight:bold;color:'+rc+'">'+(l.resultado>=0?"+":"")+fmt(l.resultado)+'</span>'
      +'<button class="ibt" onclick="startEdit(\''+l.id+'\',\'bet\',\''+encodeURIComponent(JSON.stringify(l))+'\')">✏️</button>'
      +'<button class="ibt" onclick="delBet(\''+l.id+'\')">🗑️</button>'
      +'</div></div></div>';
  }).join("");
  return '<div class="card" style="margin-bottom:10px;"><div style="padding:16px;">'
    +'<div class="lbl" style="color:#8C3A8C;margin-bottom:12px;">🧧 APUESTAS Y QUINIELA</div>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-end;">'
    +'<div>'
    +'<div style="font-size:11px;color:#555;margin-bottom:4px;">Balance este mes</div>'
    +'<div style="font-size:32px;font-weight:bold;color:'+bColor+';">'+(ap.balance_mes>=0?"+":"")+fmt(ap.balance_mes)+'</div>'
    +'</div>'
    +'<div style="text-align:right;">'
    +'<div style="font-size:11px;color:#555;margin-bottom:4px;">Acumulado 2026</div>'
    +'<div style="font-size:24px;font-weight:bold;color:'+aColor+';">'+(ap.acum_anio>=0?"+":"")+fmt(ap.acum_anio)+'</div>'
    +'</div></div>'
    +'<div style="display:flex;gap:10px;margin-top:14px;">'
    +'<div style="flex:1;"><div style="font-size:10px;color:#555;margin-bottom:4px;">Actualizar balance mes</div>'
    +'<input class="iline" type="number" style="width:100%;" value="'+ap.balance_mes+'" onchange="updateApBalance(\'mes\',this.value)" placeholder="€ mes"></div>'
    +'<div style="flex:1;"><div style="font-size:10px;color:#555;margin-bottom:4px;">Actualizar acumulado año</div>'
    +'<input class="iline" type="number" style="width:100%;" value="'+ap.acum_anio+'" onchange="updateApBalance(\'anio\',this.value)" placeholder="€ año"></div>'
    +'</div></div></div>'
    +'<div class="card">'
    +'<div class="card-hdr"><div class="lbl" style="color:#8C3A8C;">REGISTRO APUESTAS</div></div>'
    +((ap.lineas||[]).length===0?'<div class="empty">Sin registros aún</div>':"")
    +rh
    +'<div class="arow">'
    +'<input class="ai w" placeholder="Descripción" oninput="S.newBet.desc=this.value">'
    +'<input class="ai n" placeholder="€ resultado" oninput="S.newBet.resultado=this.value">'
    +'<button style="background:#8C3A8C;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:18px;font-weight:bold;" onclick="addBet()">+</button>'
    +'</div></div>';
}

// ─── BANCOS ────────────────────────────────────────────────────────────────
function renderBancos(){
  var bk=cur().bankinter||[];var sb=cur().sabadell||[];
  function bankSection(title,color,items,which){
    var tot=items.reduce(function(s,x){return s+x.importe;},0);
    var paid=items.filter(function(x){return x.pagado;}).reduce(function(s,x){return s+x.importe;},0);
    var rows=items.map(function(item){
      return '<div class="chk-row" onclick="toggleChk(\''+which+'\',\''+item.id+'\')">'
        +'<div class="chk-left">'
        +'<div class="chk-box'+(item.pagado?" done":"")+'">'+( item.pagado?"✓":"")+'</div>'
        +'<span class="chk-label'+(item.pagado?" done":"")+'">'+esc(item.label)+'</span>'
        +'</div>'
        +'<span class="chk-amt" style="color:'+(item.pagado?"#444":color)+'">'+fmt(item.importe)+'</span>'
        +'</div>';
    }).join("");
    var pct=tot>0?Math.round((paid/tot)*100):0;
    return '<div class="card" style="margin-bottom:10px;">'
      +'<div class="card-hdr" style="background:'+color+'18;">'
      +'<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:18px;">🏦</span>'
      +'<span style="font-size:14px;font-weight:bold;color:var(--text);">'+title+'</span></div>'
      +'<div style="text-align:right;">'
      +'<div style="font-size:13px;font-weight:bold;color:'+color+'">'+fmt(paid)+' / '+fmt(tot)+'</div>'
      +'<div style="font-size:10px;color:#444;">'+pct+'% cobrado</div>'
      +'</div></div>'
      +'<div style="height:3px;background:#040410;"><div style="height:3px;background:'+color+';width:'+pct+'%;transition:width .3s;"></div></div>'
      +rows
      +'<div style="padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid #0E0E1E;">'
      +'<span style="font-size:12px;color:#555;">Pendiente</span>'
      +'<span style="font-size:14px;font-weight:bold;color:'+(paid<tot?"#F0A0A0":"#5AC45A")+'">'+fmt(tot-paid)+'</span>'
      +'</div></div>';
  }
  return bankSection("Bankinter","#1A7ABF",bk,"bankinter")
       + bankSection("Sabadell","#E8505B",sb,"sabadell");
}

// ─── NOTAS ─────────────────────────────────────────────────────────────────
function renderNotas(){
  var recs=cur().recordatorios||[];
  var rh=recs.map(function(r){
    var c=r.tipo==="warning"?"#E8C87A":"#4A8CBF";
    if(S.editId===r.id){
      return '<div class="xrow"><div class="erow">'
        +'<input class="ei w" value="'+esc(r.texto)+'" oninput="S.editRow.texto=this.value">'
        +'<select class="ei" onchange="S.editRow.tipo=this.value"><option value="info"'+(r.tipo==="info"?" selected":"")+'>ℹ️ Info</option><option value="warning"'+(r.tipo==="warning"?" selected":"")+'>⚠️ Alerta</option></select>'
        +'<button class="ei" style="background:#27ae60;color:#fff;border:none;cursor:pointer;" onclick="saveNota(\''+r.id+'\')">✓</button>'
        +'<button class="ei" style="background:#333;color:#666;border:none;cursor:pointer;" onclick="cancelEdit()">✕</button>'
        +'</div></div>';
    }
    return '<div class="xrow"><div class="xin" style="align-items:flex-start;padding:12px 14px;">'
      +'<div style="flex:1;">'
      +(r.tipo==="warning"?'<span style="font-size:10px;color:#E8C87A;letter-spacing:1px;font-family:monospace;">⚠️ RECORDATORIO</span>':'<span style="font-size:10px;color:#4A8CBF;letter-spacing:1px;font-family:monospace;">ℹ️ NOTA</span>')
      +'<div style="font-size:13px;color:#C0B8A8;margin-top:4px;line-height:1.5;">'+esc(r.texto)+'</div>'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:4px;margin-left:10px;">'
      +'<button class="ibt" onclick="startEdit(\''+r.id+'\',\'nota\',\''+encodeURIComponent(JSON.stringify(r))+'\')">✏️</button>'
      +'<button class="ibt" onclick="delNota(\''+r.id+'\')">🗑️</button>'
      +'</div></div></div>';
  }).join("");
  return '<div class="card">'
    +'<div class="card-hdr"><div class="lbl" style="color:#8A5A1A;">📌 RECORDATORIOS Y NOTAS</div></div>'
    +(recs.length===0?'<div class="empty">Sin notas aún</div>':"")
    +rh
    +'<div class="arow">'
    +'<input class="ai w" placeholder="Texto de la nota" oninput="S.newRow.texto=this.value">'
    +'<select class="ai" onchange="S.newRow.tipo=this.value"><option value="info">ℹ️ Info</option><option value="warning">⚠️ Alerta</option></select>'
    +'<button style="background:#8A5A1A;color:#fff;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:18px;font-weight:bold;" onclick="addNota()">+</button>'
    +'</div></div>';
}

// ─── CRUD ─────────────────────────────────────────────────────────────────
function startEdit(id,sec,enc){S.editId=id;S.editSec=sec;try{S.editRow=JSON.parse(decodeURIComponent(enc));}catch(e){S.editRow={};}renderContent();}
function cancelEdit(){S.editId=null;renderContent();}

function saveEdit(catId,id){
  var imp=parseFloat(String(S.editRow.importe).replace(",","."));if(isNaN(imp))return;
  var d=cur();d.gastos[catId]=d.gastos[catId].map(function(g){return g.id===id?Object.assign({},g,{concepto:S.editRow.concepto,importe:imp,nota:S.editRow.nota||""}):g;});
  S.editId=null;saveData(d);
}
function delGasto(catId,id){var d=cur();d.gastos[catId]=d.gastos[catId].filter(function(g){return g.id!==id;});saveData(d);}
function addGasto(catId){
  var imp=parseFloat(String(S.newRow.importe).replace(",","."));
  if(!S.newRow.concepto||isNaN(imp)||imp<0)return;
  var d=cur();if(!d.gastos[catId])d.gastos[catId]=[];
  d.gastos[catId].push({id:uid(),concepto:S.newRow.concepto,importe:imp,nota:S.newRow.nota||""});
  S.newRow={concepto:"",importe:"",persona:"paulo"};saveData(d);
}

function saveGasEdit(id){
  var d=cur();
  d.gasolina=d.gasolina.map(function(g){
    if(g.id!==id)return g;
    return {id:g.id,fecha:S.editRow.fecha||g.fecha,precio:parseFloat(S.editRow.precio)||g.precio,
      euros:parseFloat(S.editRow.euros)||g.euros,litros:parseFloat(S.editRow.litros)||g.litros,
      kms:parseFloat(S.editRow.kms)||g.kms,km_total:parseFloat(S.editRow.km_total)||g.km_total};
  });
  S.editId=null;saveData(d);
}
function delGas(id){var d=cur();d.gasolina=d.gasolina.filter(function(g){return g.id!==id;});saveData(d);}
function addGas(){
  var ng=S.newGas;var euros=parseFloat(ng.euros);if(!ng.fecha||isNaN(euros))return;
  var d=cur();if(!d.gasolina)d.gasolina=[];
  d.gasolina.push({id:uid(),fecha:ng.fecha,precio:parseFloat(ng.precio)||0,euros:euros,
    litros:parseFloat(ng.litros)||0,kms:parseFloat(ng.kms)||0,km_total:parseFloat(ng.km_total)||0});
  S.newGas={fecha:"",precio:"",euros:"",litros:"",kms:"",km_total:""};saveData(d);
}

function saveBetEdit(id){
  var res=parseFloat(String(S.editRow.resultado).replace(",","."));if(isNaN(res))return;
  var d=cur();d.apuestas.lineas=d.apuestas.lineas.map(function(l){return l.id===id?Object.assign({},l,{desc:S.editRow.desc,resultado:res}):l;});
  S.editId=null;saveData(d);
}
function delBet(id){var d=cur();d.apuestas.lineas=d.apuestas.lineas.filter(function(l){return l.id!==id;});saveData(d);}
function addBet(){
  var res=parseFloat(String(S.newBet.resultado).replace(",","."));
  if(!S.newBet.desc||isNaN(res))return;
  var d=cur();if(!d.apuestas.lineas)d.apuestas.lineas=[];
  d.apuestas.lineas.push({id:uid(),desc:S.newBet.desc,resultado:res});
  S.newBet={desc:"",resultado:""};saveData(d);
}
function updateApBalance(which,val){
  var d=cur();var v=parseFloat(val)||0;
  if(which==="mes")d.apuestas.balance_mes=v;else d.apuestas.acum_anio=v;
  saveData(d);
}

function toggleChk(which,id){
  var d=cur();
  d[which]=d[which].map(function(x){return x.id===id?Object.assign({},x,{pagado:!x.pagado}):x;});
  saveData(d);
}

function saveNota(id){
  var d=cur();d.recordatorios=d.recordatorios.map(function(r){return r.id===id?Object.assign({},r,{texto:S.editRow.texto,tipo:S.editRow.tipo||r.tipo}):r;});
  S.editId=null;saveData(d);
}
function delNota(id){var d=cur();d.recordatorios=d.recordatorios.filter(function(r){return r.id!==id;});saveData(d);}
function addNota(){
  if(!S.newRow.texto)return;
  var d=cur();if(!d.recordatorios)d.recordatorios=[];
  d.recordatorios.push({id:uid(),texto:S.newRow.texto,tipo:S.newRow.tipo||"info"});
  S.newRow={concepto:"",importe:"",persona:"paulo"};saveData(d);
}


</script>
</body>
